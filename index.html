<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Designs">

    <title>Shrinkflation</title>
<style>
    body, html {
        margin: 0; padding: 0;
        /* Using 100dvh ensures it fits perfectly even with the iOS Home Bar */
        width: 100vw; height: 100dvh; 
        background-color: #000;
        overflow: hidden; 
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-user-select: none; user-select: none;
    }

    #carousel {
        display: flex; 
        width: 100vw; height: 100dvh;
        overflow-x: auto; overflow-y: hidden;
        scroll-snap-type: none; 
        -webkit-overflow-scrolling: touch; 
        scrollbar-width: none; 
        opacity: 0; transition: opacity 0.5s ease;
    }
    #carousel::-webkit-scrollbar { display: none; }

    .slide {
        flex: 0 0 100vw; width: 100vw; height: 100dvh;
        scroll-snap-align: center;
        display: flex; justify-content: center; align-items: center;
        /* Adds a safety buffer so the design doesn't hit the very top/bottom glass */
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }
    
    .slide img {
        max-width: 100%; max-height: 100%;
        object-fit: contain; pointer-events: none;
    }

    #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444; font-size: 14px; }

    #pagination {
        position: fixed; 
        /* Positions the dots just above the Home Bar */
        bottom: calc(15px + env(safe-area-inset-bottom)); 
        left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px; z-index: 20; padding: 8px 12px;
        border-radius: 20px; background-color: rgba(0, 0, 0, 0.4); 
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
    }
    #pagination.visible { opacity: 1; }
    
    .dot { width: 6px; height: 6px; border-radius: 50%; background-color: rgba(255,255,255,0.3); transition: all 0.3s ease; }
    .dot.active { background-color: #fff; transform: scale(1.3); }

    #filename-overlay {
        position: fixed; top: 0; left: 0; width: 100%; 
        /* Pushes the text below the Notch/Dynamic Island */
        padding: calc(20px + env(safe-area-inset-top)) 0 20px 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        color: white; text-align: center; font-size: 13px; z-index: 30;
        opacity: 0; transform: translateY(-10px); transition: all 0.25s ease; pointer-events: none;
    }
    #filename-overlay.show { opacity: 1; transform: translateY(0); }

    .tap-zone { position: fixed; top: 0; height: 100%; z-index: 10; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    #next-zone { right: 0; width: 60%; }
    #prev-zone { left: 0; width: 40%; }
</style>
</head>
<body>

    <div id="loader">Loading images...</div>
    <div id="filename-overlay"></div>
    <div id="carousel"></div>
    <div id="pagination"></div>
    
    <div id="prev-zone" class="tap-zone"></div>
    <div id="next-zone" class="tap-zone"></div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const githubUsername = "davidvb"; 
        const githubRepo = "shrinkflation"; 
        const folderPath = "images"; // The name of the folder where you'll keep your screenshots
        // ==========================================
        
        const carousel = document.getElementById('carousel');
        const pagination = document.getElementById('pagination');
        const overlay = document.getElementById('filename-overlay');
        let slidesData = [];
        let dots = [];
        let isTeleporting = false;
        let hidePageTimer;

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${githubUsername}/${githubRepo}/contents/${folderPath}`);
                const files = await res.json();
                const images = files.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));

                images.forEach((file, i) => {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    const img = new Image();
                    img.src = file.download_url;
                    img.dataset.name = file.name;
                    slide.appendChild(img);
                    carousel.appendChild(slide);
                    slidesData.push(slide);

                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    pagination.appendChild(dot);
                    dots.push(dot);
                });

                if (slidesData.length > 1) {
                    const firstClone = slidesData[0].cloneNode(true);
                    const lastClone = slidesData[slidesData.length - 1].cloneNode(true);
                    carousel.prepend(lastClone);
                    carousel.append(firstClone);

                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            carousel.scrollLeft = carousel.offsetWidth;
                            carousel.style.opacity = "1";
                            carousel.style.scrollSnapType = "x mandatory";
                            document.getElementById('loader').style.display = 'none';
                        });
                    });

                    carousel.addEventListener('scroll', handleScroll, { passive: true });
                } else {
                    carousel.style.opacity = "1";
                    document.getElementById('loader').style.display = 'none';
                }
            } catch (e) { console.error(e); }
        }

        function handleScroll() {
            if (isTeleporting) return;
            const w = carousel.offsetWidth, x = carousel.scrollLeft;
            const totalWidth = w * (slidesData.length + 1);

            let idx = Math.round(x / w);
            let dotIdx = (idx === 0) ? slidesData.length - 1 : (idx > slidesData.length) ? 0 : idx - 1;
            dots.forEach((d, i) => d.classList.toggle('active', i === dotIdx));
            
            pagination.classList.add('visible');
            clearTimeout(hidePageTimer);
            hidePageTimer = setTimeout(() => pagination.classList.remove('visible'), 1000);

            if (x <= 5 || x >= totalWidth - 5) {
                isTeleporting = true;
                carousel.style.scrollSnapType = "none";
                setTimeout(() => {
                    if (x <= 5) carousel.scrollLeft = w * slidesData.length;
                    else if (x >= totalWidth - 5) carousel.scrollLeft = w;
                    requestAnimationFrame(() => {
                        carousel.style.scrollSnapType = "x mandatory";
                        isTeleporting = false;
                    });
                }, 50);
            }
        }

        function navigate(dir) {
            carousel.scrollTo({ left: carousel.scrollLeft + (dir * carousel.offsetWidth), behavior: 'smooth' });
        }

        document.getElementById('next-zone').addEventListener('click', () => navigate(1));
        document.getElementById('prev-zone').addEventListener('click', () => navigate(-1));

        let pTimer;
        function show() {
            const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
            const realIdx = (idx === 0) ? slidesData.length - 1 : (idx > slidesData.length) ? 0 : idx - 1;
            overlay.innerText = slidesData[realIdx].querySelector('img').dataset.name;
            overlay.classList.add('show');
        }
        const hide = () => overlay.classList.remove('show');
        
        window.addEventListener('touchstart', () => pTimer = setTimeout(show, 500));
        window.addEventListener('touchend', () => { clearTimeout(pTimer); hide(); });
        window.addEventListener('mousedown', () => pTimer = setTimeout(show, 500));
        window.addEventListener('mouseup', () => { clearTimeout(pTimer); hide(); });
        window.addEventListener('contextmenu', e => e.preventDefault());

        init();
    </script>
</body>
</html>
